apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: vcluster-tenants
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=default
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git
              revision: main
              files:
                - path: platform/kubernetes/tenants/tenants.yaml
          - list:
              elementsYaml: "{{ .tenants | toJson }}"
  template:
    metadata:
      name: "{{ .name }}-bootstrap"
      namespace: argocd
      labels:
        tenant: "{{ .name }}"
    spec:
      project: default
      source:
        repoURL: https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git
        targetRevision: main
        path: platform/kubernetes/vcluster
        helm:
          values: |
            vcluster_config:
              name: "{{ .name }}"
              namespace: "{{ .namespace }}"
              chart_version: '{{ default "0.33.1" .chartVersion }}'
              overrides: |
                {{ .vclusterOverrides | default "" | nindent 16 }}
            argocd:
              namespace: "argocd"
              create_project: true
              project: '{{ default (printf "tenant-%s" .name) .project }}'
              role_name: '{{ default "tenant-admin" .argocdUser.roleName }}'
              host_cluster_server: "https://kubernetes.default.svc"
              source_repos:
                {{ (.sourceRepos | default (list "https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git")) | toYaml | nindent 16 }}
            psa:
              enabled: {{ default false .psa.enabled }}
              config: {{ .psa.config | default (list) | toYaml | nindent 16 }}
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
        retry:
          limit: -1
          backoff:
            duration: "5s"
            factor: 2
            maxDuration: "3m"
