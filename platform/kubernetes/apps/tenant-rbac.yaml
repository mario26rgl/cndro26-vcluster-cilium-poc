apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git'
    targetRevision: main
    path: platform/kubernetes/argocd-tenant-rbac
    helm:
      valueFiles:
        - ../tenants/tenants.yaml
      values: |
        argocdNamespace: argocd
        aws:
          createSecretStore: true
          secretStore:
            name: aws-secretsmanager
            kind: SecretStore
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1
      backoff:
        duration: "5s"
        factor: 2
        maxDuration: "3m"
