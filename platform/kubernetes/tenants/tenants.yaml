tenants:
- name: tenant-one
  namespace: tenant-one
  project: tenant-one
  chartVersion: "0.33.1"
  sourceRepos:
  - https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git
  vclusterOverrides: |
    sync:
      toHost:
        pods:
          runtimeClassName: runc
    policies:
      resourceQuota:
        enabled: true
        quota:
          requests.cpu: 10
          requests.memory: 20Gi
          limits.cpu: 20
          limits.memory: 40Gi
          services.loadbalancers: 1
      networkPolicy:
        enabled: true
        workload:
          publicEgress:
            enabled: true
            cidr: 0.0.0.0/0
  psa:
    enabled: true
    config:
    - level: baseline
      action: audit
  tenantConfig:
    auth:
      mode: local
    repoCredentials:
      enabled: true
      secretsRef:
      - name: one
        authType: basic 
        key: /argocd/tenants/tenant-one/repo