{{- if gt (len .Values.tenants) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: {{ .Values.argocdNamespace }}
data:
{{- range $tenant := .Values.tenants }}
{{- $enabled := default true $tenant.argocdUser.enabled }}
{{- if $enabled }}
{{- $username := default (printf "%s-admin" $tenant.name) $tenant.argocdUser.username }}
  accounts.{{ $username }}: login
  accounts.{{ $username }}.enabled: "true"
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: {{ .Values.argocdNamespace }}
data:
{{- range $tenant := .Values.tenants }}
{{- $enabled := default true $tenant.argocdUser.enabled }}
{{- if $enabled }}
{{- $username := default (printf "%s-admin" $tenant.name) $tenant.argocdUser.username }}
{{- $project := default (printf "tenant-%s" $tenant.name) $tenant.project }}
{{- $roleName := default "tenant-admin" $tenant.argocdUser.roleName }}
  policy.tenant-{{ $tenant.name }}.csv: |
    p, proj:{{ $project }}:{{ $roleName }}, applications, *, {{ $project }}/*, allow
    p, proj:{{ $project }}:{{ $roleName }}, logs, get, {{ $project }}/*, allow
    g, {{ $username }}, proj:{{ $project }}:{{ $roleName }}
{{- end }}
{{- end }}
{{- end }}
{{- range $tenant := .Values.tenants }}
{{- $enabled := default true $tenant.argocdUser.enabled }}
{{- if and $enabled $tenant.argocdUser.passwordHashSecretRef $tenant.argocdUser.passwordHashSecretRef.key }}
{{- $username := default (printf "%s-admin" $tenant.name) $tenant.argocdUser.username }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-user-{{ $tenant.name }}
  namespace: {{ $.Values.argocdNamespace }}
spec:
  refreshInterval: {{ default "5m" $tenant.argocdUser.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.aws.secretStore.name }}
    kind: {{ $.Values.aws.secretStore.kind }}
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: accounts.{{ $username }}.password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.argocdUser.passwordHashSecretRef.key }}
        property: {{ default "passwordHash" $tenant.argocdUser.passwordHashSecretRef.property }}
{{- if and $tenant.argocdUser.passwordMtimeSecretRef $tenant.argocdUser.passwordMtimeSecretRef.key }}
    - secretKey: accounts.{{ $username }}.passwordMtime
      remoteRef:
        conversionStrategy: Default 
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.argocdUser.passwordMtimeSecretRef.key }}
        property: {{ default "passwordMtime" $tenant.argocdUser.passwordMtimeSecretRef.property }}
{{- end }}
{{- end }}
{{- end }}
