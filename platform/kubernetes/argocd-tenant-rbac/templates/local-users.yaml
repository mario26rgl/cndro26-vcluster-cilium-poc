{{- if gt (len .Values.tenants) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: {{ .Values.argocdNamespace }}
data:
{{- range $tenant := .Values.tenants }}
{{- $mode := default local $tenant.tenantConfig.auth.mode }}
{{- $enabled := eq $mode "local" }}
{{- if $enabled }}
{{- $username := (printf "%s-admin" $tenant.name) }}
  accounts.{{ $username }}: login
  accounts.{{ $username }}.enabled: "true"
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: {{ .Values.argocdNamespace }}
data:
{{- range $tenant := .Values.tenants }}
{{- $mode := default local $tenant.tenantConfig.auth.mode }}
{{- $enabled := eq $mode "local" }}
{{- if $enabled }}
{{- $username := (printf "%s-admin" $tenant.name) }}
{{- $project := default (printf "tenant-%s" $tenant.name) $tenant.project }}
{{- $roleName := "tenant-admin" }}
  policy.tenant-{{ $tenant.name }}.csv: |
    p, proj:{{ $project }}:{{ $roleName }}, applications, *, {{ $project }}/*, allow
    p, proj:{{ $project }}:{{ $roleName }}, logs, get, {{ $project }}/*, allow
    g, {{ $username }}, proj:{{ $project }}:{{ $roleName }}
{{- end }}
{{- end }}
{{- end }}
{{- range $tenant := .Values.tenants }}
{{- $mode := default local $tenant.tenantConfig.auth.mode }}
{{- $enabled := eq $mode "local" }}
{{- if $enabled }}
{{- $username := (printf "%s-admin" $tenant.name) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-user-{{ $tenant.name }}
  namespace: {{ $.Values.argocdNamespace }}
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: {{ $.Values.aws.secretStore.name }}
    kind: {{ $.Values.aws.secretStore.kind }}
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: accounts.{{ $username }}.password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: /argocd/tenants/{{ $tenant.name }}/user
        property: "passwordHash"
    - secretKey: accounts.{{ $username }}.passwordMtime
      remoteRef:
        conversionStrategy: Default 
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: /argocd/tenants/{{ $tenant.name }}/user
        property: "passwordMtime"
{{- end }}
{{- end }}
