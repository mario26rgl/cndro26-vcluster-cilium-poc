{{- range $tenant := .Values.tenants }}
{{- $repoEnabled := default false $tenant.tenantConfig.repoCredentials.enabled }}
{{- if and $repoEnabled gt (len $tenant.tenantConfig.repoCredentials.secretsRef) 0 }}
{{- range $repo := $tenant.tenantConfig.repoCredentials.secretsRef }}
{{- $authType := default "basic" $repo.authType }}
{{- $repoSecretName := (printf "argocd-repo-%s-%s" $tenant.name $repo.name) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-{{ $tenant.name }}
  namespace: {{ $.Values.argocdNamespace }}
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: {{ $.Values.aws.secretStore.name }}
    kind: {{ $.Values.aws.secretStore.kind }}
  target:
    name: {{ $repoSecretName }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: {{ $repoSecretName }}
        type: git
{{- if eq $authType "githubApp" }}
        url: '{{ `{{ .url }}` }}'
        githubAppID: '{{ `{{ .githubAppID }}` }}'
        githubAppInstallationID: '{{ `{{ .githubAppInstallationID }}` }}'
        githubAppPrivateKey: '{{ `{{ .githubAppPrivateKey }}` }}'
{{- else }}
        url: '{{ `{{ .url }}` }}'
        username: '{{ `{{ .username }}` }}'
        password: '{{ `{{ .password }}` }}'
{{- end }}
  data:
    - secretKey: url
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: "url"
{{- if eq $authType "githubApp" }}
    - secretKey: githubAppID
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: githubAppID
    - secretKey: githubAppInstallationID
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: githubAppInstallationID
    - secretKey: githubAppPrivateKey
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: githubAppPrivateKey
{{- else }}
    - secretKey: username
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: "username"
    - secretKey: password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $repo.key }}
        property: "password"
{{- end }}
{{- end }}
{{- end }}
