{{- range $tenant := .Values.tenants }}
{{- $repoEnabled := default false $tenant.repoCredentials.enabled }}
{{- if and $repoEnabled $tenant.repoCredentials.secretRef $tenant.repoCredentials.secretRef.key }}
{{- $authType := default "basic" $tenant.repoCredentials.authType }}
{{- $repoSecretName := default (printf "argocd-repo-%s" $tenant.name) $tenant.repoCredentials.name }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-repo-{{ $tenant.name }}
  namespace: {{ $.Values.argocdNamespace }}
spec:
  refreshInterval: {{ default "5m" $tenant.repoCredentials.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.aws.secretStore.name }}
    kind: {{ $.Values.aws.secretStore.kind }}
  target:
    name: {{ $repoSecretName }}
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: {{ $repoSecretName }}
        type: git
{{- if eq $authType "githubApp" }}
        url: '{{ `{{ .url }}` }}'
        githubAppID: '{{ `{{ .githubAppID }}` }}'
        githubAppInstallationID: '{{ `{{ .githubAppInstallationID }}` }}'
        githubAppPrivateKey: '{{ `{{ .githubAppPrivateKey }}` }}'
{{- else }}
        url: '{{ `{{ .url }}` }}'
        username: '{{ `{{ .username }}` }}'
        password: '{{ `{{ .password }}` }}'
{{- end }}
  data:
    - secretKey: url
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "url" $tenant.repoCredentials.secretRef.urlProperty }}
{{- if eq $authType "githubApp" }}
    - secretKey: githubAppID
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "githubAppID" $tenant.repoCredentials.secretRef.githubAppIDProperty }}
    - secretKey: githubAppInstallationID
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "githubAppInstallationID" $tenant.repoCredentials.secretRef.githubAppInstallationIDProperty }}
    - secretKey: githubAppPrivateKey
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "githubAppPrivateKey" $tenant.repoCredentials.secretRef.githubAppPrivateKeyProperty }}
{{- else }}
    - secretKey: username
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "username" $tenant.repoCredentials.secretRef.usernameProperty }}
    - secretKey: password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
        key: {{ $tenant.repoCredentials.secretRef.key }}
        property: {{ default "password" $tenant.repoCredentials.secretRef.passwordProperty }}
{{- end }}
{{- end }}
{{- end }}
