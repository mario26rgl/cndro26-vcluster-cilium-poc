{{- $vclusterName := .Values.vcluster_config.name -}}
{{- $vclusterNamespace := .Values.vcluster_config.namespace -}}
{{- $argocdProject := default "default" .Values.argocd.project -}}
{{- $hostClusterServer := default "https://kubernetes.default.svc" .Values.argocd.host_cluster_server -}}
{{- $vclusterServer := printf "https://%s.%s" $vclusterName $vclusterNamespace -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  namespace: {{ default "argocd" .Values.argocd.namespace }}
  name: {{ $vclusterName }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: {{ printf "%s-etcd" $vclusterName }}
      jqPathExpressions:
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind
        # - .spec.volumeClaimTemplates[].metadata.name
  sources:
  - repoURL: https://github.com/mario26rgl/cndro26-vcluster-cilium-poc.git
    targetRevision: HEAD
    ref: values
  - repoURL: https://charts.loft.sh
    targetRevision: {{ .Values.vcluster_config.chart_version }}
    chart: vcluster
    helm:
      releaseName: {{ $vclusterName }}
      # https://github.com/loft-sh/vcluster/blob/v0.33.1/chart/values.yaml
      valueFiles:
        - $values/platform/kubernetes/vcluster/vcluster-defaults.yaml
      values: |
        controlPlane:
          proxy:
            extraSANs:
            - "{{ $vclusterServer }}"
        exportKubeConfig:
          context: {{ $vclusterName }}
          server: {{ $vclusterServer }}
{{- with .Values.vcluster_config.overrides }}
{{ . | nindent 8 }}
{{- end }}
  destination:
    server: {{ $hostClusterServer }}
    namespace: {{ $vclusterNamespace }}
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true