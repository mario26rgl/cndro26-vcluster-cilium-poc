apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-metrics
  namespace: metrics-app
  labels:
    app: tenant-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-metrics
  template:
    metadata:
      labels:
        app: tenant-metrics
        vcluster-tenant: tenant1
    spec:
      containers:
        - name: metrics-app
          image: mariorgl/cndro26-metrics:amd64
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
          resources:
            limits:
              cpu: "0.5"
              memory: "128Mi"
            requests:
              cpu: "0.25"
              memory: "64Mi"
